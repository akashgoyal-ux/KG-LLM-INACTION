# Provider configuration
# Override any value via environment variable (env var takes precedence)
# NEVER commit secrets – put actual keys in .env

llm:
  default_provider: ollama          # openai | azure | ollama | mock
  cache_dir: data_fin/cache_llm
  max_retries: 3
  retry_backoff_base: 2.0           # seconds; doubles each retry

  openai:
    model: gpt-4o-mini
    # api_key: set via OPENAI_API_KEY env var
    temperature: 0.0
    max_tokens: 4096

  azure:
    model: gpt-4o
    # api_key:     set via AZURE_OPENAI_API_KEY
    # endpoint:    set via AZURE_OPENAI_ENDPOINT
    # deployment:  set via AZURE_OPENAI_DEPLOYMENT
    # api_version: set via AZURE_OPENAI_API_VERSION (default: 2024-02-01)
    temperature: 0.0
    max_tokens: 4096

  ollama:
    model: deepseek-v3.2:cloud
    base_url: http://localhost:11434
    temperature: 0.0
    timeout: 600                    # seconds; 27B local model on CPU needs ~3-10 min for longer prompts

  mock:
    # Returns static fixtures from data_fin/samples/mock_responses/
    fixture_dir: data_fin/samples/mock_responses

graph:
  uri: bolt://localhost:7687         # override: NEO4J_URI
  user: neo4j                        # override: NEO4J_USER
  # password: set via NEO4J_PASSWORD
  database: neo4j                  # override: NEO4J_DATABASE (Community Edition only supports 'neo4j')
  encrypted: 0

vector:
  default_backend: neo4j             # neo4j | faiss
  index_name: fin_embeddings
  embedding_dim: 1536                # text-embedding-3-small / ada-002
  faiss:
    index_file: data_fin/vector_index/faiss.index
    meta_file:  data_fin/vector_index/faiss_meta.jsonl
